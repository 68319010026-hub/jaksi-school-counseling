<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบหลังบ้านสำหรับคุณครู</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" style="max-width: 1400px;"> 
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>ระบบหลังบ้าน: ตารางรายชื่อการนัดหมายทั้งหมด</h1>
            <div>
                <button onclick="clearAllAppointments()" class="btn-action" style="background-color: #dc3545; border: none; margin-right: 10px; cursor: pointer;">ล้างข้อมูลทั้งหมด</button>
                <a href="index.html" class="btn-action" style="background-color: #6c757d; text-decoration: none;">ไปหน้าส่งคำร้อง</a>
            </div>
        </div>
        
        <table class="booking-table">
            <thead>
                <tr>
                    <th>ลำดับที่</th>
                    <th>วัน/เดือน/ปี</th>
                    <th>ชื่อ-สกุล นักเรียน</th>
                    <th>ลักษณะปัญหาที่มาขอรับคำปรึกษา</th>
                    <th>แนวทางการให้คำปรึกษา</th>
                    <th>ผลการให้คำปรึกษา</th>
                    <th>สถานะ</th>
                    <th>การส่งต่อ</th> <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                </tbody>
        </table>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="admin.js"></script>
</body>
</html>
